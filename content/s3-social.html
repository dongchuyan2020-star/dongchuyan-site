<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
::selection { background: rgba(196,58,49,0.35); }
:root { --bg: #2c2520; --text: #e8ddd0; --red: #c43a31; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: "Noto Serif SC","STSong",serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}
body::before {
  content: ''; position: fixed; inset: 0;
  opacity: 0.04;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 256px 256px;
  pointer-events: none; z-index: 0;
}

.back {
  position: fixed; top: 32px; left: 32px; z-index: 30;
  font-size: 13px; letter-spacing: 4px;
  color: rgba(232,221,208,0.75);
  text-decoration: none;
  transition: all 0.2s;
  padding: 6px 16px;
  border: 1px solid rgba(232,221,208,0.08);
  border-radius: 4px;
  background: rgba(44,37,32,0.4);
  backdrop-filter: blur(6px);
}
.back:hover {
  color: rgba(232,221,208,0.95);
  border-color: rgba(232,221,208,0.15);
  background: rgba(44,37,32,0.6);
}
.back::before { content: '← '; }

.music {
  position: fixed; top: 32px; right: 32px; z-index: 30;
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; letter-spacing: 2px;
  color: rgba(232,221,208,0.65);
  cursor: pointer;
  transition: all 0.2s;
  padding: 5px 12px;
  border: 1px solid rgba(232,221,208,0.06);
  border-radius: 16px;
  background: rgba(44,37,32,0.4);
  backdrop-filter: blur(6px);
}
.music:hover {
  color: rgba(232,221,208,0.9);
  border-color: rgba(232,221,208,0.14);
  background: rgba(44,37,32,0.6);
}
.music .dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(232,221,208,0.06);
  transition: all 0.3s;
  flex-shrink: 0;
}
.music .dot.on { background: var(--red); box-shadow: 0 0 10px rgba(196,58,49,0.4); }

.scroll-wrap {
  display: flex;
  overflow-x: auto; overflow-y: hidden;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  height: 100vh;
}
.scroll-wrap::-webkit-scrollbar { display: none; }

.page {
  flex: 0 0 100%;
  scroll-snap-align: start;
  overflow-y: auto;
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding: 100px 10% 80px 10%;
  position: relative;
}
.page::-webkit-scrollbar { display: none; }

.content {
  max-width: 640px;
  margin: 0 auto;
  position: relative; z-index: 2;
}
.content h2 {
  font-family: "Ma Shan Zheng",cursive;
  font-size: clamp(28px, 3vw, 40px);
  font-weight: 400;
  letter-spacing: 6px;
  color: var(--text);
  margin-bottom: 6px;
  opacity: 0.9;
  line-height: 1.2;
}
.content h2::after {
  content: '';
  display: block;
  width: 36px; height: 1.5px;
  background: var(--red); opacity: 0.2;
  margin-top: 6px;
}
.content .subtitle {

  font-size: clamp(14px, 0.9vw, 16px);
  color: rgba(232,221,208,0.45);

  margin-bottom: 24px;

}
.content p {

  line-height: 2;
  color: rgba(232,221,208,0.7);
  margin-bottom: 20px;
  font-weight: 300;
}

.toc-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px 24px;
  margin-top: 8px;
}
.toc-item {
  font-family: "Ma Shan Zheng",cursive;

.toc-item:hover {

/* ── 导航 ── */
.nav {

}
.nav .arr {

  color: rgba(232,221,208,0.6);

.nav-dots {

.nav-dots .d {

.nav-dots .d.active {

}
.nav-dots .d:hover { background: rgba(232,221,208,0.25); }

/* ── Lightbox ── */
.lightbox { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.9); }
.lightbox.show { display: flex; justify-content: center; align-items: center; }
.lightbox .stage { display: flex; justify-content: center; align-items: center; width: 95vw; height: 95vh; overflow: hidden; }
.lightbox .stage img { display: block; max-width: 100%; max-height: 100%; object-fit: contain; cursor: zoom-in; border-radius: 2px; }
.lightbox .stage.zoomed { display: block; overflow: auto; text-align: center; line-height: 0; }
.lightbox .stage.zoomed img { max-width: none; max-height: none; width: auto; height: auto; cursor: grab; }
.lightbox .stage.zoomed.grabbing img { cursor: grabbing; }

@media (max-width: 700px) {

  .bili-grid { grid-template-columns: 1fr; }

  .music { top: 28px; right: 20px; }
}

<script>
(function() {
  const wrap = document.getElementById('scrollWrap');
  const pages = document.querySelectorAll('.page');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const dotsContainer = document.getElementById('navDots');
  let current = 0;

  pages.forEach((_, i) => {
    const d = document.createElement('span');
    d.className = 'd' + (i === 0 ? ' active' : '');
    d.dataset.i = i;
    d.addEventListener('click', () => goTo(i));
    dotsContainer.appendChild(d);
  });
  const dots = dotsContainer.querySelectorAll('.d');

  function goTo(i) {
    if (i < 0 || i >= pages.length) return;
    pages[i].scrollIntoView({ behavior: 'smooth', inline: 'start' });
  }

  document.querySelectorAll('.toc-item').forEach(el => {
    el.addEventListener('click', () => goTo(parseInt(el.dataset.i) + 1));
  });

  prevBtn.addEventListener('click', () => {
    if (current <= 0) goTo(pages.length - 1);
    else goTo(current - 1);
  });
  nextBtn.addEventListener('click', () => {
    if (current >= pages.length - 1) goTo(0);
    else goTo(current + 1);
  });

  function update(i) {
    dots.forEach((d, idx) => d.classList.toggle('active', idx === i));
  }

  let ticking = false;
  wrap.addEventListener('scroll', () => {
    if (!ticking) {
      requestAnimationFrame(() => {
        const idx = Math.round(wrap.scrollLeft / wrap.clientWidth);
        if (idx >= 0 && idx < pages.length && idx !== current) {
          current = idx;
          update(idx);
        }
        ticking = false;
      });
      ticking = true;
    }
  });
  update(0);
})();

(function(){
  const btn = document.getElementById('musicBtn');
  const dot = document.getElementById('musicDot');
  const audio = document.getElementById('bgm');
  let playing = false;
  const saved = localStorage.getItem('bgmPlaying');
  const savedTime = localStorage.getItem('bgmTime');
  if (saved === 'true' && savedTime) {
    audio.currentTime = parseFloat(savedTime);
    audio.play().catch(() => {});
    dot.classList.add('on');
    playing = true;
  }
  audio.addEventListener('timeupdate', () => {
    localStorage.setItem('bgmTime', audio.currentTime);
  });
  btn.onclick = () => {
    playing = !playing;
    if (playing) {
      audio.play().catch(() => { playing = false; });
      dot.classList.add('on');
      localStorage.setItem('bgmPlaying', 'true');
    } else {
      audio.pause();
      dot.classList.remove('on');
      localStorage.setItem('bgmPlaying', 'false');
    }
  };
})();

const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightboxImg');
const imgStage = document.getElementById('imgStage');
let zoomed = false;

function toggleZoom() {
  zoomed = !zoomed;
  imgStage.classList.toggle('zoomed', zoomed);
  if (!zoomed) { imgStage.scrollLeft = 0; imgStage.scrollTop = 0; }
}

function closeLightbox() {
  zoomed = false; imgStage.classList.remove('zoomed');
  imgStage.scrollLeft = 0; imgStage.scrollTop = 0;
  lightbox.classList.remove('show'); lightboxImg.src = '';
}

function openLightbox(src) {
  lightboxImg.src = src; zoomed = false;
  imgStage.classList.remove('zoomed');
  imgStage.scrollLeft = 0; imgStage.scrollTop = 0;
  lightbox.classList.add('show');
}

lightboxImg.addEventListener('click', (e) => {
  e.stopPropagation(); toggleZoom();
});
lightbox.addEventListener('click', closeLightbox);

let isPan = false, panStartX, panStartY, panScrollL, panScrollT;
imgStage.addEventListener('mousedown', (e) => {
  if (e.button !== 0 || !zoomed) return;
  isPan = true; panStartX = e.pageX; panStartY = e.pageY;
  panScrollL = imgStage.scrollLeft; panScrollT = imgStage.scrollTop;
  imgStage.classList.add('grabbing'); e.preventDefault();
});
document.addEventListener('mousemove', (e) => {
  if (!isPan) return;
  imgStage.scrollLeft = panScrollL - (e.pageX - panStartX);
  imgStage.scrollTop = panScrollT - (e.pageY - panStartY);
  e.preventDefault();
});
document.addEventListener('mouseup', () => {
  if (!isPan) return; isPan = false; imgStage.classList.remove('grabbing');
});

imgStage.addEventListener('touchstart', (e) => {
  if (e.touches.length !== 1 || !zoomed) return;
  isPan = true; panStartX = e.touches[0].pageX; panStartY = e.touches[0].pageY;
  panScrollL = imgStage.scrollLeft; panScrollT = imgStage.scrollTop;
}, { passive: true });
document.addEventListener('touchmove', (e) => {
  if (!isPan || e.touches.length !== 1) return;
  imgStage.scrollLeft = panScrollL - (e.touches[0].pageX - panStartX);
  imgStage.scrollTop = panScrollT - (e.touches[0].pageY - panStartY);
}, { passive: true });
document.addEventListener('touchend', () => { isPan = false; });
</script>
